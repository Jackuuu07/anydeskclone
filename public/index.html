<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Remote Screen Share</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 40px 20px;
      text-align: center;
    }

    h1 { margin-bottom: 30px; }

    .grid {
      display: flex;
      gap: 30px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 25px;
      width: 320px;
    }

    input {
      width: 90%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-bottom: 15px;
    }

    button {
      padding: 10px 15px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      background: #ff9800;
      color: white;
    }

    #myId {
      font-size: 22px;
      color: #ffd700;
    }

    /* FULLSCREEN VIEW */
    #viewerScreen {
      display: none;
      position: fixed;
      inset: 0;
      background: black;
      z-index: 1000;
    }

    #viewerScreen video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #backBtn {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 10px;
      background: rgba(0,0,0,0.6);
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>Remote Desktop</h1>

  <div class="grid">

    <!-- HOST -->
    <div class="card">
      <h2>Your ID</h2>
      <p id="myId">Loading...</p>
      <p>Run agent to start sharing</p>
    </div>

    <!-- VIEWER -->
    <div class="card">
      <h2>Join Session</h2>
      <input id="codeInput" placeholder="Enter code" maxlength="6"/>
      <button id="joinBtn">Join</button>
    </div>

  </div>

</div>

<!-- FULLSCREEN VIEW -->
<div id="viewerScreen">
  <div id="backBtn">⬅ Back</div>
  <video id="remoteVideo" autoplay playsinline></video>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="./app.js"></script>

</body>
</html>
